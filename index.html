<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>和傘・ロケット AR体験（操作確定版）</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://gftruj.github.io/aframe-gesture-detector-component/dist/aframe-gesture-detector-component.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; pointer-events: none; text-align: center;
        }
        .hidden { display: none !important; }
        
        #instruction-ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 12px 20px;
            border-radius: 25px; font-size: 14px; z-index: 900; 
            pointer-events: none; text-align: center; width: 80%; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="scanning-overlay">
        <p>ARシステム起動中...</p>
        <p style="font-size: 12px; margin-top: 10px;">カメラの許可ポップアップが出たら「許可」を押してください</p>
    </div>

    <div id="instruction-ui" class="hidden">
        画面を2秒長押し：オブジェクトを配置/移動<br>
        1本指フリック：回転 / 2本指ピンチ：拡大縮小
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false;"
             gesture-detector
             renderer="colorManagement: true; physicallyCorrectLights: true;">
        
        <a-assets>
            <a-asset-item id="rocketModel" src="WebAR-Rocket.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-gltf-model id="rocket"
                      src="#rocketModel" 
                      position="0 -0.5 -2" 
                      scale="0.5 0.5 0.5" 
                      rotation="0 0 0"
                      visible="false"
                      class="clickable"
                      gesture-handler="minScale: 0.05; maxScale: 3.0">
        </a-gltf-model>

    </a-scene>

    <script>
        const rocket = document.getElementById('rocket');
        const overlay = document.getElementById('scanning-overlay');
        const instruction = document.getElementById('instruction-ui');
        
        let touchTimeout = null;

        // 起動後2秒で案内を表示
        window.addEventListener('load', () => {
            setTimeout(() => {
                overlay.classList.add('hidden');
                instruction.classList.remove('hidden');
            }, 2000);
        });

        // --- 2秒間長押しでの出現・リセットロジック ---
        // 画面のどこを触っても、最前面のレイヤーが邪魔していても一発で動くようにHTML全体（window）のイベントで処理します
        window.addEventListener('touchstart', (e) => {
            // 2本指操作（ピンチ）のときは長押し判定を行わない
            if (e.touches.length > 1) return;

            touchTimeout = setTimeout(() => {
                // すでに表示されている場合は、一度初期位置（正面）に引き戻して角度をリセット（再配置機能）
                rocket.setAttribute('position', '0 -0.5 -2');
                rocket.setAttribute('rotation', '0 0 0');
                rocket.setAttribute('visible', 'true');
            }, 2000); // 2秒
        });

        // 指が動いたり離れたら長押しをキャンセル
        window.addEventListener('touchend', () => { clearTimeout(touchTimeout); });
        window.addEventListener('touchmove', () => { clearTimeout(touchTimeout); });
    </script>
</body>
</html>
