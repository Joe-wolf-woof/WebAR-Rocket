<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ロケット AR体験（透過・操作完全版）</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://gftruj.github.io/aframe-gesture-detector-component/dist/aframe-gesture-detector-component.min.js"></script>

    <style>
        /* 💡 画面を完全に透過させ、裏側のカメラ映像を見せるための必須設定 */
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-family: sans-serif; z-index: 999; pointer-events: none;
            padding: 20px; text-align: center;
        }
        .hidden { display: none !important; }
        #instruction-ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
            border-radius: 20px; font-family: sans-serif; font-size: 14px;
            z-index: 900; pointer-events: none; text-align: center; width: 80%;
        }
    </style>
</head>
<body>

    <div id="scanning-overlay">
        <p>AR空間を初期化中...</p>
        <p style="font-size: 12px; margin-top: 10px;">起動後、画面を2秒間長押しするとオブジェクトが現れます</p>
    </div>

    <div id="instruction-ui" class="hidden">
        画面を2秒長押し：オブジェクトを配置/移動<br>
        1本指フリック：回転 / 2本指ピンチ：拡大縮小
    </div>

    <a-scene embedded
             gesture-detector
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true">
        
        <a-assets>
            <a-asset-item id="wagasaModel" src="WebAR-Rocket.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0" look-controls="enabled: false">
            <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable; far: 100;"></a-entity>
        </a-camera>

        <a-entity id="ar-target" position="0 0.5 -3">
            
            <a-gltf-model id="wagasa"
                          src="#wagasaModel" 
                          position="0 0 0" 
                          scale="0.5 0.5 0.5" 
                          rotation="0 0 0"
                          visible="false"
                          class="clickable"
                          gesture-handler="minScale: 0.05; maxScale: 3.0">
            </a-gltf-model>
            
            <a-plane id="touch-floor" class="clickable" position="0 0 0" rotation="-90 0 0" width="100" height="100" material="transparent: true; opacity: 0.0"></a-plane>

        </a-entity>
    </scene>

    <script>
        const wagasa = document.getElementById('wagasa');
        const overlay = document.getElementById('scanning-overlay');
        const instruction = document.getElementById('instruction-ui');
        
        let touchStartTime = 0;
        let touchTimeout = null;

        window.addEventListener('load', () => {
            setTimeout(() => {
                overlay.classList.add('hidden');
                instruction.classList.remove('hidden');
            }, 1500);
        });

        // --- 2秒長押しの配置・移動ロジック（床面レイキャスト連動） ---
        function handleLongTouch(e) {
            if (e.detail && e.detail.intersection) {
                // タップした床の「正確な3D座標」を取得
                const p = e.detail.intersection.point;
                
                // 親要素（ar-target）からの相対座標に変換するため、Z軸を調整
                wagasa.setAttribute('position', `${p.x} 0 ${p.z + 3}`);
                wagasa.setAttribute('visible', 'true');
            } else {
                // 万が一床を外してタップしても、正面に安全に出現させるフォールバック
                wagasa.setAttribute('position', '0 0 0');
                wagasa.setAttribute('visible', 'true');
            }
        }

        window.addEventListener('touchstart', (e) => {
            touchStartTime = Date.now();
            touchTimeout = setTimeout(() => {
                // A-Frameのカーソルイベントから交差情報を引き継ぐ
                const cursorEl = document.querySelector('[cursor]');
                const intersection = cursorEl.components.raycaster.getIntersection(document.getElementById('touch-floor'));
                
                handleLongTouch({ detail: { intersection: intersection } });
            }, 2000);
        });

        window.addEventListener('touchend', () => { clearTimeout(touchTimeout); });
        window.addEventListener('touchmove', () => { clearTimeout(touchTimeout); });


        // --- ジェスチャーコンポーネント ---
        AFRAME.registerComponent('gesture-handler', {
            schema: {
                minScale: {type: 'number', default: 0.05},
                maxScale: {type: 'number', default: 3}
            },
            init: function () {
                this.handleScale = this.handleScale.bind(this);
                this.handleRotation = this.handleRotation.bind(this);

                this.el.sceneEl.addEventListener('twoFingerGesture', this.handleScale);
                this.el.sceneEl.addEventListener('oneFingerGesture', this.handleRotation);
            },
            handleScale: function (event) {
                if (!wagasa.getAttribute('visible')) return;
                let scaleFactor = event.detail.spreadChange / event.detail.startSpread;
                let currentScale = this.el.getAttribute('scale');
                
                let scaleX = currentScale.x * (1 + scaleFactor);
                let scaleY = currentScale.y * (1 + scaleFactor);
                let scaleZ = currentScale.z * (1 + scaleFactor);

                scaleX = Math.min(Math.max(scaleX, this.data.minScale), this.data.maxScale);
                scaleY = Math.min(Math.max(scaleY, this.data.minScale), this.data.maxScale);
                scaleZ = Math.min(Math.max(scaleZ, this.data.minScale), this.data.maxScale);

                this.el.setAttribute('scale', {x: scaleX, y: scaleY, z: scaleZ});
            },
            handleRotation: function (event) {
                if (!wagasa.getAttribute('visible')) return;
                let currentRotation = this.el.getAttribute('rotation');
                
                // フリック移動量に応じて回転
                let rotationX = currentRotation.x - event.detail.positionChange.y * 0.6;
                let rotationY = currentRotation.y + event.detail.positionChange.x * 0.6;

                this.el.setAttribute('rotation', {x: rotationX, y: rotationY, z: currentRotation.z});
            }
        });
    </script>
</body>
</html>
