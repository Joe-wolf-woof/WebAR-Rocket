<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>和傘・ロケット AR体験（安定動作版）</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://gftruj.github.io/aframe-gesture-detector-component/dist/aframe-gesture-detector-component.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; pointer-events: none; text-align: center;
        }
        .hidden { display: none !important; }
        
        #instruction-ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 12px 20px;
            border-radius: 25px; font-size: 14px; z-index: 900; 
            pointer-events: none; text-align: center; width: 80%; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="scanning-overlay">
        <p>ARシステム起動中...</p>
        <p style="font-size: 12px; margin-top: 10px;">カメラの許可ポップアップが出たら「許可」を押してください</p>
    </div>

    <div id="instruction-ui" class="hidden">
        画面を2秒長押し：オブジェクトを配置/移動<br>
        1本指フリック：回転 / 2本指ピンチ：拡大縮小
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false;"
             gesture-detector
             renderer="colorManagement: true; physicallyCorrectLights: true;">
        
        <a-assets>
            <a-asset-item id="rocketModel" src="WebAR-Rocket.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0" look-controls="enabled: false">
            <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable; far: 100;"></a-entity>
        </a-camera>

        <a-entity id="ar-target" position="0 0 -2.5">
            
            <a-gltf-model id="rocket"
                          src="#rocketModel" 
                          position="0 0 0" 
                          scale="0.5 0.5 0.5" 
                          rotation="0 0 0"
                          visible="false"
                          class="clickable"
                          gesture-handler="minScale: 0.05; maxScale: 3.0">
            </a-gltf-model>
            
            <a-plane id="touch-floor" class="clickable" position="0 -1 0" rotation="-90 0 0" width="100" height="100" material="transparent: true; opacity: 0.0"></a-plane>

        </a-entity>
    </scene>

    <script>
        const rocket = document.getElementById('rocket');
        const overlay = document.getElementById('scanning-overlay');
        const instruction = document.getElementById('instruction-ui');
        const floor = document.getElementById('touch-floor');
        
        let touchTimeout = null;

        // ページ読み込み後、AR.jsの初期化時間を考慮して2秒後に案内を表示
        window.addEventListener('load', () => {
            setTimeout(() => {
                overlay.classList.add('hidden');
                instruction.classList.remove('hidden');
            }, 2000);
        });

        // --- 2秒間長押しでの位置決定・移動ロジック ---
        function handleLongTouch(e) {
            if (e.detail && e.detail.intersection) {
                const p = e.detail.intersection.point;
                // タップした座標（床の上）にロケットを移動して表示
                rocket.setAttribute('position', `${p.x} ${p.y + 1} ${p.z + 2.5}`);
                rocket.setAttribute('visible', 'true');
            } else {
                // 交差が取得できなかった場合のセーフティ
                rocket.setAttribute('position', '0 0 0');
                rocket.setAttribute('visible', 'true');
            }
        }

        window.addEventListener('touchstart', (e) => {
            touchTimeout = setTimeout(() => {
                const cursorEl = document.querySelector('[cursor]');
                if (cursorEl && cursorEl.components.raycaster) {
                    const intersection = cursorEl.components.raycaster.getIntersection(floor);
                    handleLongTouch({ detail: { intersection: intersection } });
                }
            }, 2000); // 2000ms = 2秒
        });

        window.addEventListener('touchend', () => { clearTimeout(touchTimeout); });
        window.addEventListener('touchmove', () => { clearTimeout(touchTimeout); });


        // --- ジェスチャー（フリック回転・ピンチ拡大縮小）制御コンポーネント ---
        AFRAME.registerComponent('gesture-handler', {
            schema: {
                minScale: {type: 'number', default: 0.05},
                maxScale: {type: 'number', default: 3}
            },
            init: function () {
                this.handleScale = this.handleScale.bind(this);
                this.handleRotation = this.handleRotation.bind(this);

                this.el.sceneEl.addEventListener('twoFingerGesture', this.handleScale);
                this.el.sceneEl.addEventListener('oneFingerGesture', this.handleRotation);
            },
            handleScale: function (event) {
                if (!rocket.getAttribute('visible')) return;
                let scaleFactor = event.detail.spreadChange / event.detail.startSpread;
                let currentScale = this.el.getAttribute('scale');
                
                let scaleX = currentScale.x * (1 + scaleFactor);
                let scaleY = currentScale.y * (1 + scaleFactor);
                let scaleZ = currentScale.z * (1 + scaleFactor);

                scaleX = Math.min(Math.max(scaleX, this.data.minScale), this.data.maxScale);
                scaleY = Math.min(Math.max(scaleY, this.data.minScale), this.data.maxScale);
                scaleZ = Math.min(Math.max(scaleZ, this.data.minScale), this.data.maxScale);

                this.el.setAttribute('scale', {x: scaleX, y: scaleY, z: scaleZ});
            },
            handleRotation: function (event) {
                if (!rocket.getAttribute('visible')) return;
                let currentRotation = this.el.getAttribute('rotation');
                
                // フリック量に応じた回転調整（0.5 = 回転速度）
                let rotationX = currentRotation.x - event.detail.positionChange.y * 0.5;
                let rotationY = currentRotation.y + event.detail.positionChange.x * 0.5;

                this.el.setAttribute('rotation', {x: rotationX, y: rotationY, z: currentRotation.z});
            }
        });
    </script>
</body>
</html>
